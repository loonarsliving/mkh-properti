.pk{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid}

.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 2px;background:none;border:none}
.ni .ic{font-size:20px}

<script>
// ═══ FIREBASE ═════════════════════════════════════════════════════
firebase.initializeApp({

const PR = [
  {id:"AFP",nama:"Al Fath Puuwatu",   rek:"1901 8811 4444 1", w:"#f0a500"},
  {id:"IH", nama:"Introvert House",   rek:"4420 1881 4099 04",w:"#00b894"},

const COA = [
  {k:"1-1001",n:"Kas Tunai",g:"Aset Lancar",t:"D"},

  {k:"3-1001",n:"Modal Pemilik",g:"Ekuitas",t:"K"},

];

// ═══ STATE ════════════════════════════════════════════════════════
let J=[], A=[], fp="ALL", pg="db";

// ═══ UTILS ════════════════════════════════════════════════════════
const fmt = n => new Intl.NumberFormat("id-ID").format(Math.round(Math.abs(n)||0));
const fmts = n => { const a=Math.abs(n||0); return a>=1e9?"Rp "+(a/1e9).toFixed(1)+"M":a>=1e6?"Rp "+(a/1e6).toFixed(1)+"jt":"Rp "+fmt(a); };
const today = () => new Date().toISOString().slice(0,10);
const gp = id => PR.find(p=>p.id===id)||{w:"#888",nama:"-",id:"-"};
const gc = k => COA.find(c=>c.k===k)||{n:"",g:"",t:"D"};
const gi = id => document.getElementById(id);
const gv = id => { const e=gi(id); return e?e.value.trim():""; };
const sv = (id,val) => { const e=gi(id); if(e) e.value=val; };
const tag = pid => { const p=gp(pid); return `<span class="tag" style="background:${p.w}25;color:${p.w}">${pid}</span>`; };

function showToast(msg,type){
  const t=gi("toast");
  t.textContent=msg; t.style.display="block";
  t.style.background=type==="red"?"#ef4444":type==="amber"?"#f0a500":"#00b894";
  t.style.color=type==="amber"?"#000":"#fff";
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",3000);
}

function nextNo(pfx){
  const nums=J.filter(j=>j.no&&j.no.startsWith(pfx)).map(j=>parseInt(j.no.split("-")[1])||0);
  return pfx+"-"+String((nums.length?Math.max(...nums):0)+1).padStart(3,"0");
}

// ═══ LOGIN ════════════════════════════════════════════════════════
function doLogin(){
  const u=gv("logUser"), p=gv("logPass");
  const err=gi("logErr");
  if(!u||!p){ err.style.display="block"; err.textContent="Isi username dan password!"; return; }
  if(USERS[u] && USERS[u]===p){
    err.style.display="none";
    localStorage.setItem("mkh_auth","1");
    localStorage.setItem("mkh_user",u);
    showApp();
  } else {
    err.style.display="block";
    err.textContent="Username atau password salah!";
  }
}

function showApp(){
  gi("pg-login").style.display="none";
  gi("pg-app").style.display="flex";
  const u=localStorage.getItem("mkh_user")||"";
  gi("dbSt").textContent="Halo, "+u;
  startDB();
  render();
}

function doLogout(){
  if(!confirm("Keluar?")) return;
  localStorage.removeItem("mkh_auth");
  DB.ref("data").off();
  J=[]; A=[];
  gi("pg-app").style.display="none";
  gi("pg-login").style.display="flex";
}

// ═══ FIREBASE ═════════════════════════════════════════════════════
function startDB(){
  gi("dbSt").textContent="Menghubungkan...";
  DB.ref("data/jurnal").on("value", snap=>{
    J=[];
    snap.forEach(c=>{ const d=c.val(); J.push({...d,fbKey:c.key,D:+d.D||0,K:+d.K||0}); });
    gi("dbSt").textContent="● Terhubung";
    render();
  });
  DB.ref("data/aset").on("value", snap=>{
    A=[];
    snap.forEach(c=>{ A.push({...c.val(),fbKey:c.key}); });
    render();
  });
}

const dbPush = (path,data) => DB.ref(path).push(data);
const dbSet  = (path,data) => DB.ref(path).update(data);
const dbDel  = path => DB.ref(path).remove();
async function dbDelWhere(path,field,val){
  const snap=await DB.ref(path).orderByChild(field).equalTo(val).once("value");
  const u={}; snap.forEach(c=>u[c.key]=null);
  if(Object.keys(u).length) await DB.ref(path).update(u);
}

// ═══ SAVE OPS ═════════════════════════════════════════════════════
async function saveKM(){
  const tgl=gv("km-tgl"),no=gv("km-no"),pid=gv("km-pid"),rek=gv("km-rek"),
        jenis=gv("km-jenis"),pembeli=gv("km-pembeli"),uid=gv("km-unit"),
        nom=parseFloat(gv("km-nom"))||0,ket=gv("km-ket");
  if(!tgl||!no||!nom) return showToast("Lengkapi tanggal, no & nominal!","red");
  const apk=jenis==="Penjualan Rumah"?"4-1001":jenis==="Uang Muka / DP"?"4-1002":"4-1003";
  const blk=uid?(A.find(a=>a.fbKey===uid)||{}).blok||"":"";
  const ktr=jenis+(blk?" - "+blk:"")+(pembeli?" ("+pembeli+")")+(ket?" - "+ket:"");
  try{
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:rek,nama:gc(rek).n,proyek:pid,D:nom,K:0});
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:apk,nama:gc(apk).n,proyek:pid,D:0,K:nom});
    if(uid){ const st=jenis==="Penjualan Rumah"?"terjual":"dp"; await dbSet("data/aset/"+uid,{status:st,pembeli,tgl_jual:tgl}); }
    showToast("✅ Kas Masuk Rp "+fmt(nom)+" tersimpan!");
    sv("km-nom",""); sv("km-pembeli",""); sv("km-ket",""); sv("km-no","");
  } catch(e){ showToast("Gagal: "+e.message,"red"); }
}

async function saveKK(){

        nom=parseFloat(gv("kk-nom"))||0,ket=gv("kk-ket");
  if(!tgl||!no||!nom) return showToast("Lengkapi tanggal, no & nominal!","red");
  const abk=jenis==="Pembelian Material"?"5-1001":jenis==="Bayar Distributor"?"5-1002":jenis==="Upah Tukang"?"5-1003":jenis==="Biaya Subkon"?"5-1004":"6-1007";
  const ktr=jenis+(sup?" - "+sup:"")+(ket?" - "+ket:"");
  try{
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:abk,nama:gc(abk).n,proyek:pid,D:nom,K:0});
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:rek,nama:gc(rek).n,proyek:pid,D:0,K:nom});
    showToast("✅ Kas Keluar Rp "+fmt(nom)+" tersimpan!");
    sv("kk-nom",""); sv("kk-sup",""); sv("kk-ket",""); sv("kk-no","");
  } catch(e){ showToast("Gagal: "+e.message,"red"); }
}

async function savePAP(){
  const tgl=gv("pap-tgl"),no=gv("pap-no"),dari=gv("pap-dari"),ke=gv("pap-ke"),
        nom=parseFloat(gv("pap-nom"))||0,ket=gv("pap-ket");
  if(!tgl||!no||!nom) return showToast("Lengkapi semua field!","red");
  if(dari===ke) return showToast("Proyek tidak boleh sama!","red");
  const nd=gp(dari).nama,nk=gp(ke).nama;
  const ktr="Pinjam: "+nd+" → "+nk+(ket?" ("+ket+")":"");
  try{
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:"1-1006",nama:"Piutang Antar Proyek",proyek:dari,D:nom,K:0});
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:RC[dari],nama:"Bank "+nd,proyek:dari,D:0,K:nom});
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:RC[ke],nama:"Bank "+nk,proyek:ke,D:nom,K:0});
    await dbPush("data/jurnal",{tgl,no,ket:ktr,akun:"2-1002",nama:"Utang Antar Proyek",proyek:ke,D:0,K:nom});
    showToast("✅ Pinjaman tercatat!");
    sv("pap-nom",""); sv("pap-ket",""); sv("pap-no","");
  } catch(e){ showToast("Gagal: "+e.message,"red"); }
}

async function saveAset(){
  const pid=gv("ast-pid"),tipe=gv("ast-tipe"),blok=gv("ast-blok"),
        luas=parseFloat(gv("ast-luas"))||0,harga=parseFloat(gv("ast-harga"))||0,ket=gv("ast-ket");
  if(!blok||!harga) return showToast("Lengkapi nama unit & harga!","red");
  try{
    await dbPush("data/aset",{proyek:pid,tipe,blok,luas,harga,status:"tersedia",pembeli:"",ket});
    showToast("✅ Aset "+blok+" terdaftar!");
    sv("ast-blok",""); sv("ast-luas",""); sv("ast-harga",""); sv("ast-ket","");
  } catch(e){ showToast("Gagal: "+e.message,"red"); }
}

async function delAset(key){ if(!confirm("Hapus aset?")) return; try{ await dbDel("data/aset/"+key); showToast("🗑 Aset dihapus"); } catch(e){ showToast("Gagal","red"); } }
async function delJr(no){ if(!confirm("Hapus jurnal "+no+"?")) return; try{ await dbDelWhere("data/jurnal","no",no); showToast("🗑 Jurnal dihapus"); } catch(e){ showToast("Gagal","red"); } }

function exportExcel(){
  const wb=XLSX.utils.book_new();
  const fj=fp==="ALL"?J:J.filter(j=>j.proyek===fp);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Tgl","No","Proyek","Keterangan","Kode","Akun","Debet","Kredit"],...fj.map(j=>[j.tgl,j.no,gp(j.proyek).nama,j.ket,j.akun,j.nama,j.D,j.K])]),"Jurnal");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Proyek","Tipe","Blok","Luas","Harga","Status","Pembeli"],...A.map(a=>[gp(a.proyek).nama,a.tipe,a.blok,a.luas,a.harga,a.status,a.pembeli])]),"Aset");
  XLSX.writeFile(wb,"MKH-"+today()+".xlsx");
  showToast("📊 Excel didownload!","amber");
}

// ═══ SALDO ════════════════════════════════════════════════════════
function calcS(){
  const s={}; COA.forEach(c=>s[c.k]={...c,D:0,K:0});
  J.forEach(j=>{ if(!s[j.akun])s[j.akun]={k:j.akun,n:j.nama,g:"",t:"D",D:0,K:0}; s[j.akun].D+=j.D; s[j.akun].K+=j.K; });
  return s;
}
const gs=(k,s)=>{ const a=s[k]; if(!a)return 0; return a.t==="D"?a.D-a.K:a.K-a.D; };
const sum=(g,s)=>Object.values(s).filter(a=>a.g===g).reduce((t,a)=>t+gs(a.k,s),0);
const ppend=pid=>J.filter(j=>j.proyek===pid&&gc(j.akun).g==="Pendapatan").reduce((t,j)=>t+j.K,0);
const pbeban=pid=>J.filter(j=>j.proyek===pid&&(gc(j.akun).g==="HPP"||gc(j.akun).g==="Beban Operasional")).reduce((t,j)=>t+j.D,0);

function goPage(p){
  pg=p;
  document.querySelectorAll("#bottomnav .ni").forEach(b=>b.classList.remove("on"));
  const nb=document.querySelector(`#bottomnav [data-pg="${p}"]`);
  if(nb) nb.classList.add("on"); else gi("moreBtn").classList.add("on");
  closeDrawer();
  render();
}

function openDrawer(){ gi("drawer").classList.add("open"); gi("drawerBg").classList.add("show"); }
function closeDrawer(){ gi("drawer").classList.remove("open"); gi("drawerBg").classList.remove("show"); }

function setFilter(val){
  fp=val;
  document.querySelectorAll("#filterbar .fb").forEach(b=>b.classList.remove("on"));
  document.querySelector(`#filterbar [data-f="${val}"]`).classList.add("on");
  render();
}

function pSel(id,val){

      </div>
      <div style="font-size:12px;color:var(--mt);margin-bottom:3px">${j.ket}</div>
      <div style="font-size:10px;color:var(--mt);font-family:monospace">${j.akun} · ${j.nama}</div>
      <div style="display:flex;gap:12px;margin-top:6px">
        ${j.D>0?`<span style="font-size:12px;font-weight:700;color:var(--g)">D: ${fmts(j.D)}</span>`:""}
        ${j.K>0?`<span style="font-size:12px;font-weight:700;color:var(--rd)">K: ${fmts(j.K)}</span>`:""}
      </div></div>`).join("")||'<div style="text-align:center;color:var(--mt);padding:40px">Belum ada</div>');
    document.querySelectorAll(".delJrBtn").forEach(b=>b.onclick=()=>delJr(b.dataset.no));
  }

  else if(pg==="ns"){
    C.innerHTML=`<div class="lbl" style="margin-bottom:8px">Neraca Saldo</div>`+
    ns.map(a=>`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;color:var(--a);font-family:monospace">${a.k}</div><div style="font-size:12px;font-weight:600">${a.n}</div><div style="font-size:10px;color:var(--mt)">${a.g}</div></div>
      <div style="text-align:right">
        ${a.sD>0?`<div style="font-size:12px;font-weight:700;color:var(--g)">${fmts(a.sD)}</div>`:""}
        ${a.sK>0?`<div style="font-size:12px;font-weight:700;color:var(--a)">${fmts(a.sK)}</div>`:""}
      </div></div>`).join("")||'<div style="text-align:center;color:var(--mt);padding:40px">Belum ada</div>';
  }

  else if(pg==="lr"){
    C.innerHTML=`
    <div class="card" style="text-align:center;margin-bottom:12px"><div style="font-weight:800;font-size:15px">PT. Maha Karya Haluoleo</div><div style="color:var(--a);font-size:12px;margin-top:3px">LAPORAN LABA RUGI</div></div>
    ${[{t:"PENDAPATAN",g:"Pendapatan",tot:tP,c:"var(--g)"},{t:"BEBAN PROYEK",g:"HPP",tot:tH,c:"var(--rd)"},{t:"BEBAN OPERASIONAL",g:"Beban Operasional",tot:tO,c:"var(--pu)"}].map(gr=>`
    <div class="card"><div style="font-size:10px;font-weight:700;color:${gr.c};margin-bottom:10px;text-transform:uppercase">${gr.t}</div>
      ${Object.values(s).filter(a=>a.g===gr.g).map(a=>({...a,sv:a.t==="K"?a.K-a.D:a.D-a.K})).filter(a=>a.sv>0).map(a=>`
      <div class="row"><span style="font-size:12px;color:var(--mt)">${a.n}</span><span style="font-size:12px;color:${gr.c};font-weight:600">${fmts(a.sv)}</span></div>`).join("")}
      <div class="row" style="font-weight:700;border-top:1px solid var(--bdr);padding-top:8px;margin-top:4px"><span>Total</span><span style="color:${gr.c}">${fmts(gr.tot)}</span></div>
    </div>`).join("")}
    <div class="card" style="background:var(--bdr)"><div class="row"><span style="font-weight:700">LABA KOTOR</span><span style="font-weight:700;color:${lK>=0?"var(--g)":"var(--rd)"}">${fmts(lK)}</span></div></div>
    <div class="card" style="background:${lB>=0?"#0d2a1e":"#2a0d0d"};border-color:${lB>=0?"var(--g)":"var(--rd)"}">
      <div class="row"><span style="font-size:15px;font-weight:800">LABA BERSIH</span><span style="font-size:15px;font-weight:800;color:${lB>=0?"var(--g)":"var(--rd)"}">${fmts(lB)}</span></div>
      ${tP>0?`<div style="font-size:10px;color:var(--mt);margin-top:4px">Net Margin: ${((lB/tP)*100).toFixed(1)}%</div>`:""}
    </div>`;
  }

  else if(pg==="nr"){
    const bal=Math.abs((tAL+tAT)-(tLL+tLP+tEk))<1;
    C.innerHTML=`
    <div class="card"><div style="font-size:11px;font-weight:700;color:var(--g);margin-bottom:10px">ASET</div>
      ${[{l:"Aset Lancar",g:"Aset Lancar",tot:tAL},{l:"Aset Tetap",g:"Aset Tetap",tot:tAT}].map(gr=>`
      <div style="margin-bottom:10px"><div style="font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px;text-transform:uppercase">${gr.l}</div>
        ${Object.values(s).filter(a=>a.g===gr.g).map(a=>({...a,sv:a.t==="D"?a.D-a.K:a.K-a.D})).filter(a=>a.sv!==0).map(a=>`
        <div class="row"><span style="font-size:11px;color:var(--mt)">${a.n}</span><span style="font-size:11px">${fmts(a.sv)}</span></div>`).join("")}
        <div class="row" style="font-weight:700"><span>Total ${gr.l}</span><span style="color:var(--g)">${fmts(gr.tot)}</span></div>
      </div>`).join("")}
      <div style="background:var(--bdr);border-radius:8px;padding:10px;display:flex;justify-content:space-between;font-weight:800"><span>TOTAL ASET</span><span style="color:var(--g)">${fmts(tAL+tAT)}</span></div>
    </div>
    <div class="card"><div style="font-size:11px;font-weight:700;color:var(--a);margin-bottom:10px">LIABILITAS & EKUITAS</div>
      ${[{l:"Liabilitas Lancar",g:"Liabilitas Lancar",tot:tLL},{l:"Liabilitas Panjang",g:"Liabilitas Panjang",tot:tLP}].map(gr=>`
      <div style="margin-bottom:10px"><div style="font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px;text-transform:uppercase">${gr.l}</div>
        ${Object.values(s).filter(a=>a.g===gr.g).map(a=>({...a,sv:a.t==="K"?a.K-a.D:a.D-a.K})).filter(a=>a.sv>0).map(a=>`
        <div class="row"><span style="font-size:11px;color:var(--mt)">${a.n}</span><span style="font-size:11px">${fmts(a.sv)}</span></div>`).join("")}
        <div class="row" style="font-weight:700"><span>Total</span><span style="color:var(--a)">${fmts(gr.tot)}</span></div>
      </div>`).join("")}
      <div style="margin-bottom:10px"><div style="font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px;text-transform:uppercase">Ekuitas</div>
        ${Object.values(s).filter(a=>a.g==="Ekuitas").map(a=>({...a,sv:a.t==="K"?a.K-a.D:a.D-a.K})).map(a=>`
        <div class="row"><span style="font-size:11px;color:var(--mt)">${a.n}</span><span style="font-size:11px">${fmts(a.sv)}</span></div>`).join("")}
        <div class="row"><span style="font-size:11px;color:var(--mt)">Laba Bersih Periode</span><span style="font-size:11px;color:${lB>=0?"var(--g)":"var(--rd)"}">${fmts(lB)}</span></div>
        <div class="row" style="font-weight:700"><span>Total Ekuitas</span><span style="color:var(--g)">${fmts(tEk)}</span></div>
      </div>
      <div style="background:var(--bdr);border-radius:8px;padding:10px;display:flex;justify-content:space-between;font-weight:800"><span>TOTAL L+E</span><span style="color:var(--a)">${fmts(tLL+tLP+tEk)}</span></div>
      <div style="text-align:center;margin-top:10px;font-size:11px;font-weight:700;color:${bal?"var(--g)":"var(--rd)"}">${bal?"✓ Neraca Balance":"⚠ Neraca Tidak Balance"}</div>
    </div>`;
  }

  else if(pg==="coa"){
    const kats=["Aset Lancar","Aset Tetap","Liabilitas Lancar","Liabilitas Panjang","Ekuitas","Pendapatan","HPP","Beban Operasional"];
    C.innerHTML=kats.map(kat=>`<div class="card"><div style="font-size:10px;font-weight:700;color:var(--a);margin-bottom:8px;text-transform:uppercase">${kat}</div>
      ${COA.filter(a=>a.g===kat).map(a=>`<div class="row">
        <div><div style="font-size:10px;color:var(--a);font-family:monospace">${a.k}</div><div style="font-size:12px">${a.n}</div></div>
        <span class="tag" style="background:${a.t==="D"?"var(--g)":"var(--a)"}25;color:${a.t==="D"?"var(--g)":"var(--a)"}">${a.t==="D"?"Debet":"Kredit"}</span>
      </div>`).join("")}</div>`).join("");
  }
}

// ═══ EVENT LISTENERS ══════════════════════════════════════════════
// Login button
gi("logBtn").addEventListener("click", doLogin);
gi("logPass").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });

// Nav buttons
document.querySelectorAll("#bottomnav [data-pg]").forEach(b=>{
  b.addEventListener("click", ()=>goPage(b.dataset.pg));
});
gi("moreBtn").addEventListener("click", openDrawer);
gi("drawerBg").addEventListener("click", closeDrawer);
document.querySelectorAll(".drBtn").forEach(b=>{
  b.addEventListener("click", ()=>goPage(b.dataset.pg));
});

// Filter buttons
document.querySelectorAll("#filterbar .fb").forEach(b=>{
  b.addEventListener("click", ()=>setFilter(b.dataset.f));
});

// Top buttons
gi("xlsBtn").addEventListener("click", exportExcel);
gi("outBtn").addEventListener("click", doLogout);

// ═══ INIT ═════════════════════════════════════════════════════════
if(localStorage.getItem("mkh_auth")==="1"){
  showApp();
} else {
  gi("pg-login").style.display="flex";
}
</script>
</body>
</html>
