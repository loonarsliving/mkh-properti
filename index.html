<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f18;--card:#111827;--border:#1e2d40;
  --accent:#f0a500;--accent2:#00b894;--text:#e2e8f0;
  --muted:#64748b;--danger:#ef4444;--purple:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%;box-sizing:border-box;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
button{cursor:pointer;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 14px;font-size:11px;color:var(--text);border-bottom:1px solid rgba(30,45,64,.4)}
tr:hover td{background:rgba(30,45,64,.4)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-green{background:var(--accent2);color:#fff}
.btn-red{background:var(--danger);color:#fff}
.btn-amber{background:var(--accent);color:#000}
.btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:var(--border);color:var(--muted)}
.btn-full{width:100%;padding:12px}
.label{font-size:10px;color:var(--muted);margin-bottom:4px;display:block;letter-spacing:.03em;text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:9px;font-weight:700}
.section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
#toast{position:fixed;top:20px;right:20px;z-index:9999;display:none;padding:12px 18px;border-radius:10px;font-size:12px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:320px}
#loader{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,15,24,.85);z-index:8888;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="toast"></div>
<div id="loader">
  <div class="spinner"></div>
  <div id="loader-msg" style="font-size:12px;color:var(--muted)">Memuat...</div>
</div>

<!-- TOP BAR -->
<div style="background:#070b12;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
  <div style="width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🏗</div>
  <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:700">PT. Maha Karya Haluoleo</div>
    <div style="font-size:9px;color:var(--muted)">Sistem Keuangan Properti & Kontraktor</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <select id="filterProyek" onchange="setFilter(this.value)" style="width:auto;font-size:11px;padding:6px 10px">
      <option value="ALL">Semua Proyek</option>

    <button class="btn btn-purple" style="padding:7px 14px;font-size:11px" onclick="window.open('laporan-keuangan.html','_blank')">📄 Laporan KAP</button>
    <button class="btn btn-ghost" style="padding:7px 14px;font-size:11px" onclick="logout()">🔒 Keluar</button>
  </div>
</div>

<!-- NAV -->
<div style="background:#070b12;border-bottom:1px solid var(--border);display:flex;overflow-x:auto">
  <div id="nav" style="display:flex;min-width:max-content"></div>
</div>

<!-- CONTENT -->
<div id="content" style="flex:1;overflow-y:auto;padding:16px 20px"></div>

// ── SUPABASE API ──────────────────────────────────────────────────
async function sbGet(table,params=""){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{...H,"Prefer":"return=representation"}});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function sbInsert(table,rows){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(rows)});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function sbPatch(table,filter,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${filter}`,{method:"PATCH",headers:{...H,"Prefer":"return=minimal"},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());
}
async function sbDelete(table,filter){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${filter}`,{method:"DELETE",headers:H});
  if(!r.ok)throw new Error(await r.text());
}

const fmt=n=>new Intl.NumberFormat("id-ID").format(Math.round(Math.abs(n)||0));

// ── BUILD PROYEK ARRAY ────────────────────────────────────────────
function buildProyekArray(){
  const hardIds=PROYEK_HARDCODED.map(p=>p.id);
  const dynMapped=dynProjects
    .filter(p=>!hardIds.includes(p.kode))
    .map(p=>({id:p.kode,nama:p.nama,rek:p.rekening||"",bank:p.bank||"BSI",warna:p.warna||"#64748b",dynamic:true,dbId:p.id,lokasi:p.lokasi||""}));

    utangBank=utangBank.map(u=>({...u,pokok:parseFloat(u.pokok)||0,potongan_per_unit:parseFloat(u.potongan_per_unit)||0,terbayar:parseFloat(u.terbayar)||0}));

// ── KALKULASI ─────────────────────────────────────────────────────
function calcSaldo(){
  const s={};
  COA.forEach(a=>{s[a.kode]={...a,D:0,K:0}});
  jurnal.forEach(j=>{
    if(!s[j.akun])s[j.akun]={kode:j.akun,nama:j.nama||j.akun,kat:"",tipe:"D",D:0,K:0};
    s[j.akun].D+=j.D||0;s[j.akun].K+=j.K||0;
  });
  return s;
}
function getSaldo(kode,sm){const a=sm[kode];if(!a)return 0;return a.tipe==="D"?a.D-a.K:a.K-a.D}
function sumKat(kat,sm){return Object.values(sm).filter(a=>a.kat===kat).reduce((s,a)=>s+getSaldo(a.kode,sm),0)}
function proyekSaldo(pid,sm){return getSaldo(REK_COA[pid]||"1-1001",sm)}
function proyekPend(pid){return jurnal.filter(j=>j.proyek===pid&&COA.find(c=>c.kode===j.akun&&c.kat==="Pendapatan")).reduce((s,j)=>s+j.K,0)}
function proyekBeban(pid){return jurnal.filter(j=>j.proyek===pid&&COA.find(c=>c.kode===j.akun&&(c.kat==="HPP"||c.kat==="Beban Operasional"))).reduce((s,j)=>s+j.D,0)}

            <div style="font-size:9px;color:var(--muted);margin-bottom:8px">${p.bank}·${p.rek}</div>

            <div style="display:flex;justify-content:space-between;margin-top:8px">
              <div><div style="font-size:9px;color:var(--muted)">Pendapatan</div><div style="font-size:11px;color:var(--accent2)">Rp ${fmt(pend)}</div></div>
              <div style="text-align:right"><div style="font-size:9px;color:var(--muted)">Beban</div><div style="font-size:11px;color:var(--danger)">Rp ${fmt(beban)}</div></div>

            <div style="margin-top:5px;font-size:9px;color:var(--muted)">${jml} unit · ${terjual} terjual/dp</div>
          </div>`;
        }).join("")}
      </div>
      <div class="grid4" style="margin-bottom:16px">
        ${[{l:"Total Pendapatan",v:totalPend,c:"var(--accent2)",i:"📈"},{l:"Laba Kotor",v:labaKotor,c:labaKotor>=0?"var(--accent2)":"var(--danger)",i:"💰"},{l:"Beban Operasional",v:totalOps,c:"var(--danger)",i:"📉"},{l:"Laba Bersih",v:labaBersih,c:labaBersih>=0?"var(--accent2)":"var(--danger)",i:"✅"}]
          .map(k=>`<div class="card" style="margin-bottom:0;padding:12px 14px">
            <div style="font-size:18px;margin-bottom:4px">${k.i}</div>

async function simpanAset(){
  const pid=v("ast-proyek"),tipe=v("ast-tipe"),blok=v("ast-blok").trim(),
        luas=parseFloat(v("ast-luas"))||0,harga=parseFloat(v("ast-harga"))||0,ket=v("ast-ket").trim();
  if(!blok||!harga)return toast("Nama unit dan harga wajib diisi!","red");
  showLoader("Menyimpan aset...");
  try{
    const rows=await sbInsert("aset",[{proyek:pid,tipe,blok,luas,harga,status:"tersedia",pembeli:"",tgl_jual:null,ket}]);
    aset.push(...rows);
    toast(`✅ Aset ${blok} berhasil didaftarkan!`);
    setV("ast-blok","");setV("ast-luas","");setV("ast-harga","");setV("ast-ket","");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}
async function hapusAset(id){
  if(!confirm("Hapus aset ini?"))return;
  showLoader("Menghapus...");
  try{await sbDelete("aset","id=eq."+id);aset=aset.filter(a=>a.id!==id);toast("🗑 Aset dihapus")}
  catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

async function simpanKM(){
  const tgl=v("km-tgl"),no=v("km-no").trim(),pid=v("km-proyek"),rek=v("km-rek"),
        jenis=v("km-jenis"),pembeli=v("km-pembeli").trim(),unitId=v("km-unit"),
        nominal=parseFloat(v("km-nominal"))||0,ket=v("km-ket").trim();
  if(!tgl||!no||!nominal)return toast("Tanggal, no transaksi, dan nominal wajib!","red");
  const rekNama=COA.find(c=>c.kode===rek)?.nama||"Rekening";
  const akunPend=jenis==="Penjualan Rumah"?"4-1001":jenis==="Uang Muka / DP"?"4-1002":"4-1003";
  const pendNama=COA.find(c=>c.kode===akunPend)?.nama||"Pendapatan";
  const unitBlok=unitId?aset.find(a=>String(a.id)===String(unitId))?.blok||"":"";
  const keterangan=`${jenis}${unitBlok?" - "+unitBlok:""}${pembeli?" ("+pembeli+")":""}${ket?" - "+ket:""}`;
  showLoader("Menyimpan kas masuk...");
  try{
    const rows=await sbInsert("jurnal",[
      {tgl,no,ket:keterangan,akun:rek,   nama:rekNama, proyek:pid,d:nominal,k:0},
      {tgl,no,ket:keterangan,akun:akunPend,nama:pendNama,proyek:pid,d:0,k:nominal},
    ]);
    rows.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));
    // Update status aset jika dipilih
    if(unitId){
      const st=jenis==="Penjualan Rumah"?"terjual":"dp";
      await sbPatch("aset","id=eq."+unitId,{status:st,pembeli,tgl_jual:tgl});
      const idx=aset.findIndex(a=>String(a.id)===String(unitId));
      if(idx>-1){aset[idx].status=st;aset[idx].pembeli=pembeli;aset[idx].tgl_jual=tgl}
    }
    // Auto potong utang bank jika Penjualan Rumah
    if(jenis==="Penjualan Rumah"){
      const ubAktif=utangBank.filter(u=>u.proyek===pid&&(u.terbayar||0)<u.pokok&&(u.potongan_per_unit||0)>0);
      for(const ub of ubAktif){
        const sisa=ub.pokok-(ub.terbayar||0);
        const potong=Math.min(ub.potongan_per_unit,sisa);
        if(potong<=0)continue;
        const terbayarBaru=(ub.terbayar||0)+potong;
        await sbPatch("utang_bank","id=eq."+ub.id,{terbayar:terbayarBaru});
        const idx=utangBank.findIndex(u=>u.id===ub.id);
        if(idx>-1)utangBank[idx].terbayar=terbayarBaru;
        const noAuto="APT-"+no;
        const ketAuto=`[AUTO] Potongan utang ${ub.bank} dari penjualan unit ${unitBlok||"-"}`;
        const jAuto=await sbInsert("jurnal",[
          {tgl,no:noAuto,ket:ketAuto,akun:"2-2001",nama:"KPR/Utang Jk Panjang",proyek:pid,d:potong,k:0},
          {tgl,no:noAuto,ket:ketAuto,akun:rek,    nama:rekNama,             proyek:pid,d:0,k:potong},
        ]);
        jAuto.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));
      }
    }
    toast(`✅ Kas Masuk Rp ${fmt(nominal)} berhasil disimpan!`);
    setV("km-nominal","");setV("km-pembeli","");setV("km-ket","");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

async function simpanKK(){
  const tgl=v("kk-tgl"),no=v("kk-no").trim(),pid=v("kk-proyek"),rek=v("kk-rek"),
        jenis=v("kk-jenis"),supplier=v("kk-supplier").trim(),
        nominal=parseFloat(v("kk-nominal"))||0,ket=v("kk-ket").trim();
  if(!tgl||!no||!nominal)return toast("Tanggal, no transaksi, dan nominal wajib!","red");
  const rekNama=COA.find(c=>c.kode===rek)?.nama||"Rekening";
  const akunBbn=jenis==="Pembelian Material"?"5-1001":jenis==="Bayar Distributor"?"5-1002":jenis==="Upah Tukang"?"5-1003":jenis==="Biaya Subkon"?"5-1004":"6-1007";
  const bbnNama=COA.find(c=>c.kode===akunBbn)?.nama||jenis;
  const keterangan=`${jenis}${supplier?" - "+supplier:""}${ket?" - "+ket:""}`;
  showLoader("Menyimpan kas keluar...");
  try{
    const rows=await sbInsert("jurnal",[
      {tgl,no,ket:keterangan,akun:akunBbn,nama:bbnNama,proyek:pid,d:nominal,k:0},
      {tgl,no,ket:keterangan,akun:rek,    nama:rekNama, proyek:pid,d:0,k:nominal},
    ]);
    rows.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));
    toast(`✅ Kas Keluar Rp ${fmt(nominal)} berhasil disimpan!`);
    setV("kk-nominal","");setV("kk-supplier","");setV("kk-ket","");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

async function simpanPAP(){
  const tgl=v("pap-tgl"),no=v("pap-no").trim(),dari=v("pap-dari"),ke=v("pap-ke"),
        nominal=parseFloat(v("pap-nominal"))||0,ket=v("pap-ket").trim();
  if(!tgl||!no||!nominal)return toast("Lengkapi semua field!","red");
  if(dari===ke)return toast("Proyek asal dan tujuan tidak boleh sama!","red");
  const nmDari=getP(dari).nama,nmKe=getP(ke).nama;
  const keterangan=`Pinjam antar proyek: ${nmDari} → ${nmKe}${ket?" ("+ket+")":""}`;
  const rekDari=REK_COA[dari]||"1-1001",rekKe=REK_COA[ke]||"1-1001";
  showLoader("Menyimpan pinjaman...");
  try{
    const rows=await sbInsert("jurnal",[
      {tgl,no,ket:keterangan,akun:"1-1006",nama:"Piutang Antar Proyek",proyek:dari,d:nominal,k:0},
      {tgl,no,ket:keterangan,akun:rekDari, nama:`Bank ${nmDari}`,      proyek:dari,d:0,k:nominal},
      {tgl,no,ket:keterangan,akun:rekKe,   nama:`Bank ${nmKe}`,        proyek:ke,  d:nominal,k:0},
      {tgl,no,ket:keterangan,akun:"2-1002",nama:"Utang Antar Proyek",  proyek:ke,  d:0,k:nominal},
    ]);
    rows.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));
    toast(`✅ Pinjaman Rp ${fmt(nominal)} dari ${nmDari} ke ${nmKe} tersimpan!`);
    setV("pap-nominal","");setV("pap-ket","");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

async function hapusJurnal(no){
  if(!confirm(`Hapus semua jurnal dengan no "${no}"?`))return;
  showLoader("Menghapus...");
  try{
    await sbDelete("jurnal","no=eq."+encodeURIComponent(no));
    jurnal=jurnal.filter(j=>j.no!==no);
    toast("🗑 Jurnal dihapus");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

// ── PROJECTS ──────────────────────────────────────────────────────
async function simpanProject(){
  const kode=v("pj-kode").trim().toUpperCase();
  const nama=v("pj-nama").trim();
  const rek=v("pj-rek").trim();
  const bank=v("pj-bank").trim()||"BSI";
  const warna=v("pj-warna")||"#64748b";
  const lokasi=v("pj-lokasi").trim();
  if(!kode||!nama)return toast("Kode dan nama project wajib!","red");
  if(["AFP","IH","LL","GCI"].includes(kode))return toast("Kode sudah dipakai project existing!","red");
  if(PROYEK.find(p=>p.id===kode))return toast("Kode project sudah ada!","red");
  if(kode.length>10)return toast("Kode maksimal 10 karakter!","red");
  showLoader("Menyimpan project...");
  try{
    const rows=await sbInsert("mkh_projects",[{kode,nama,rekening:rek,bank,warna,lokasi}]);
    dynProjects.push(...rows);
    buildProyekArray();
    rebuildFilterSelect();
    toast(`✅ Project ${nama} (${kode}) berhasil ditambahkan!`);
    setV("pj-kode","");setV("pj-nama","");setV("pj-rek","");setV("pj-lokasi","");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}
async function hapusProject(id,kode){
  if(!confirm(`Hapus project "${kode}"? Data jurnal/aset project ini tidak ikut terhapus.`))return;
  showLoader("Menghapus...");
  try{
    await sbDelete("mkh_projects","id=eq."+id);
    dynProjects=dynProjects.filter(p=>p.id!==id);
    buildProyekArray();
    rebuildFilterSelect();
    toast("🗑 Project dihapus");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

// ── UTANG BANK ────────────────────────────────────────────────────
async function simpanUtang(){
  const pid=v("ub-proyek"),jenis=v("ub-jenis"),bank=v("ub-bank").trim(),
        noakad=v("ub-noakad").trim(),pokok=parseFloat(v("ub-pokok"))||0,
        potunit=parseFloat(v("ub-potunit"))||0,tgl=v("ub-tgl"),
        jttempo=v("ub-jttempo"),ket=v("ub-ket").trim();
  if(!pid||!pokok)return toast("Proyek dan pokok pinjaman wajib!","red");
  showLoader("Menyimpan utang bank...");
  try{
    const rows=await sbInsert("utang_bank",[{proyek:pid,jenis,bank,no_akad:noakad,pokok,potongan_per_unit:potunit,terbayar:0,tgl_akad:tgl||null,jt_tempo:jttempo||null,ket}]);
    utangBank.push(...rows.map(u=>({...u,pokok:parseFloat(u.pokok)||0,potongan_per_unit:parseFloat(u.potongan_per_unit)||0,terbayar:0})));
    toast(`✅ Utang bank Rp ${fmt(pokok)} berhasil dicatat!`);
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}
async function hapusUtang(id){
  if(!confirm("Hapus data utang ini?"))return;
  showLoader("Menghapus...");
  try{await sbDelete("utang_bank","id=eq."+id);utangBank=utangBank.filter(u=>u.id!==id);toast("🗑 Utang dihapus")}
  catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();renderMenu();
}

// ── USERS ─────────────────────────────────────────────────────────
// FIX: Tidak pakai /auth/v1/admin/users (butuh service_role key).
// Simpan langsung ke tabel loonars_users — sama dengan yang digunakan sales web untuk login.
async function tambahUser(){
  const nama=v("usr-nama").trim();
  const email=v("usr-email").trim().toLowerCase();
  const pw=v("usr-pw");
  const role=v("usr-role");
  if(!nama||!email||!pw)return toast("Nama, email, password wajib!","red");
  if(pw.length<6)return toast("Password minimal 6 karakter!","red");
  showLoader("Membuat user...");
  try{
    // Cek duplikat email
    const existing=await sbGet("loonars_users","email=eq."+encodeURIComponent(email)+"&select=id");
    if(existing&&existing.length>0)throw new Error("Email sudah terdaftar!");
    await sbInsert("loonars_users",[{nama,email,password_hash:pw,role}]);
    toast(`✅ User ${nama} (${role}) berhasil dibuat!`);
    setV("usr-nama","");setV("usr-email","");setV("usr-pw","");
  }catch(e){toast("Gagal: "+e.message,"red")}
  hideLoader();
}

// ── EXPORT EXCEL ──────────────────────────────────────────────────
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const fj=filterProyek==="ALL"?jurnal:jurnal.filter(j=>j.proyek===filterProyek);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Tanggal","No","Proyek","Keterangan","Kode Akun","Nama Akun","Debet","Kredit"],
    ...fj.map(j=>[j.tgl,j.no,getP(j.proyek).nama,j.ket,j.akun,j.nama,j.D,j.K])
  ]),"Jurnal");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Proyek","Tipe","Blok","Luas","Harga","Status","Pembeli","Tgl Jual"],
    ...aset.map(a=>[getP(a.proyek).nama,a.tipe,a.blok,a.luas,a.harga,a.status,a.pembeli,a.tgl_jual])
  ]),"Aset");
  PROYEK.forEach(pr=>{
    const rows=jurnal.filter(j=>j.proyek===pr.id);
    if(!rows.length)return;
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
      [pr.nama],[pr.rek||""],[""],
      ["Tanggal","No","Keterangan","Kode","Nama Akun","Debet","Kredit"],
      ...rows.map(j=>[j.tgl,j.no,j.ket,j.akun,j.nama,j.D,j.K]),
      ["","","","","Total",rows.reduce((s,j)=>s+j.D,0),rows.reduce((s,j)=>s+j.K,0)],
      [""],["","Pendapatan","",proyekPend(pr.id)],["","Beban","",proyekBeban(pr.id)],
      ["","LABA","",proyekPend(pr.id)-proyekBeban(pr.id)],
    ]),pr.id.substring(0,31));
  });
  XLSX.writeFile(wb,`MahaKarya-${today()}.xlsx`);
  toast("📊 Excel berhasil didownload!","amber");
}
