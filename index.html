// ── SUPABASE API ──────────────────────────────────────────────────
async function sbGet(table, params=""){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}&order=id.asc`,{headers:{...HEADERS,"Prefer":"return=representation"}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, rows){
  const r = await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:{...HEADERS,"Prefer":"return=representation"},body:JSON.stringify(rows)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, data){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers:{...HEADERS,"Prefer":"return=representation"},body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:HEADERS});
  if(!r.ok) throw new Error(await r.text());
}

}

// ── SALDO CALC ────────────────────────────────────────────────────
function calcSaldo(){
  const s={};
  COA.forEach(a=>{s[a.kode]={...a,D:0,K:0}});
  jurnal.forEach(j=>{
    if(!s[j.akun]) s[j.akun]={kode:j.akun,nama:j.nama,kat:"",tipe:"D",D:0,K:0};
    s[j.akun].D += j.D||0;
    s[j.akun].K += j.K||0;
  });
  return s;
}
function getSaldo(kode,sm){ const a=sm[kode]; if(!a) return 0; return a.tipe==="D"?a.D-a.K:a.K-a.D; }
function sumKat(kat,sm){ return Object.values(sm).filter(a=>a.kat===kat).reduce((s,a)=>s+getSaldo(a.kode,sm),0); }
function proyekSaldo(pid,sm){ return getSaldo(REK_COA[pid],sm)+getSaldo("1-1001",sm); }
function proyekPend(pid){ return jurnal.filter(j=>j.proyek===pid&&COA.find(c=>c.kode===j.akun&&c.kat==="Pendapatan")).reduce((s,j)=>s+j.K,0); }
function proyekBeban(pid){ return jurnal.filter(j=>j.proyek===pid&&COA.find(c=>c.kode===j.akun&&(c.kat==="HPP"||c.kat==="Beban Operasional"))).reduce((s,j)=>s+j.D,0); }

// ── KAS MASUK ─────────────────────────────────────────────────────
async function simpanKM(){
  const tgl=v("km-tgl"),no=v("km-no"),pid=v("km-proyek"),rek=v("km-rek"),
        jenis=v("km-jenis"),pembeli=v("km-pembeli"),unitId=v("km-unit"),
        nominal=parseFloat(v("km-nominal"))||0,ket=v("km-ket");
  if(!tgl||!no||!nominal) return toast("Lengkapi tanggal, no transaksi, dan nominal!","red");
  const rekNama=COA.find(c=>c.kode===rek)?.nama||"";
  const akunPend=jenis==="Penjualan Rumah"?"4-1001":jenis==="Uang Muka / DP"?"4-1002":"4-1003";
  const pendNama=COA.find(c=>c.kode===akunPend)?.nama||"Pendapatan";
  const keterangan=`${jenis}${unitId?" - "+aset.find(a=>a.id==unitId)?.blok:""}${pembeli?" ("+pembeli+")":""}${ket?" - "+ket:""}`;
  showLoader("Menyimpan kas masuk...");
  try{
    const rows = await sbInsert("jurnal",[
      {tgl,no,ket:keterangan,akun:rek,    nama:rekNama, proyek:pid,d:nominal,k:0},
      {tgl,no,ket:keterangan,akun:akunPend,nama:pendNama,proyek:pid,d:0,k:nominal},
    ]);
    rows.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));
    if(unitId){
      const st=jenis==="Penjualan Rumah"?"terjual":"dp";
      await sbUpdate("aset",unitId,{status:st,pembeli,tgl_jual:tgl});
      const idx=aset.findIndex(a=>a.id==unitId);
      if(idx>-1){aset[idx].status=st;aset[idx].pembeli=pembeli;aset[idx].tgl_jual=tgl;}
    }
    // ── AUTO POTONG UTANG BANK ──────────────────────────────────
    // Hanya untuk transaksi penjualan rumah, cek utang aktif proyek
    if(jenis==="Penjualan Rumah"){
      const utangAktif = utangBank.filter(u=>
        u.proyek===pid && (u.terbayar||0) < u.pokok && (u.potongan_per_unit||0)>0
      );
      for(const ub of utangAktif){
        const sisa = ub.pokok - (ub.terbayar||0);
        const potong = Math.min(ub.potongan_per_unit, sisa);
        if(potong <= 0) continue;

        // Update terbayar di tabel utang_bank
        const terbayarBaru = (ub.terbayar||0) + potong;
        await sbUpdate("utang_bank", ub.id, {terbayar: terbayarBaru});
        const idx2 = utangBank.findIndex(u=>u.id===ub.id);
        if(idx2>-1) utangBank[idx2].terbayar = terbayarBaru;

        // Catat jurnal potongan otomatis
        const noAuto = "APT-"+no;
        const ketAuto = `[AUTO] Potongan utang ${ub.jenis} ${ub.bank} dari penjualan${unitId?" unit "+aset.find(a=>a.id==unitId)?.blok:""}`;
        const rekAuto = REK_COA[pid] || "1-1001";
        const rekAutoNama = COA.find(c=>c.kode===rekAuto)?.nama||"Bank";
        const jAuto = await sbInsert("jurnal",[
          {tgl,no:noAuto,ket:ketAuto,akun:"2-2001",nama:"KPR / Utang Jk Panjang",proyek:pid,d:potong,k:0},
          {tgl,no:noAuto,ket:ketAuto,akun:rekAuto,nama:rekAutoNama,proyek:pid,d:0,k:potong},
        ]);
        jAuto.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));

        const sisaBaru = ub.pokok - terbayarBaru;
        toast(`✅ Kas Masuk tersimpan. Utang ${ub.bank} otomatis terpotong Rp ${fmt(potong)} — Sisa: Rp ${fmt(sisaBaru)}`,"amber");
      }
      if(utangAktif.length===0){
        toast(`✅ Kas Masuk Rp ${fmt(nominal)} berhasil disimpan!`);
      }
    } else {
      toast(`✅ Kas Masuk Rp ${fmt(nominal)} berhasil disimpan!`);
    }
    setV("km-nominal","");setV("km-pembeli","");setV("km-ket","");setV("km-no","");
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

        nominal=parseFloat(v("pap-nominal"))||0,ket=v("pap-ket");

  if(dari===ke) return toast("Proyek asal dan tujuan tidak boleh sama!","red");
  const nmDari=getP(dari).nama,nmKe=getP(ke).nama;
  const keterangan=`Pinjam antar proyek: ${nmDari} → ${nmKe}${ket?" ("+ket+")":""}`;
  showLoader("Menyimpan pinjaman...");
  try{
    const rows=await sbInsert("jurnal",[
      {tgl,no,ket:keterangan,akun:"1-1006",nama:"Piutang Antar Proyek",proyek:dari,d:nominal,k:0},
      {tgl,no,ket:keterangan,akun:REK_COA[dari],nama:`Bank ${nmDari}`,proyek:dari,d:0,k:nominal},

// ── ASET ──────────────────────────────────────────────────────────
async function simpanAset(){
  const pid=v("ast-proyek"),tipe=v("ast-tipe"),blok=v("ast-blok"),
        luas=parseFloat(v("ast-luas"))||0,harga=parseFloat(v("ast-harga"))||0,ket=v("ast-ket");
  if(!blok||!harga) return toast("Lengkapi nama unit dan harga!","red");
  showLoader("Menyimpan aset...");
  try{
    const rows=await sbInsert("aset",[{proyek:pid,tipe,blok,luas,harga,status:"tersedia",pembeli:"",ket}]);
    aset.push(...rows);
    toast(`✅ Aset ${blok} berhasil didaftarkan!`);
    setV("ast-blok","");setV("ast-luas","");setV("ast-harga","");setV("ast-ket","");
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

async function hapusAset(id){
  if(!confirm("Hapus aset ini?")) return;
  showLoader("Menghapus...");
  try{
    await sbDelete("aset",id);
    aset=aset.filter(a=>a.id!==id);
    toast("🗑 Aset dihapus");
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

async function hapusJurnal(no){
  if(!confirm(`Hapus semua jurnal dengan no ${no}?`)) return;
  showLoader("Menghapus jurnal...");
  try{
    const r=await fetch(`${SB_URL}/rest/v1/jurnal?no=eq.${encodeURIComponent(no)}`,{method:"DELETE",headers:HEADERS});
    if(!r.ok) throw new Error(await r.text());
    jurnal=jurnal.filter(j=>j.no!==no);
    toast("🗑 Jurnal dihapus");
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

// ── EXPORT ────────────────────────────────────────────────────────
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const fj=filterProyek==="ALL"?jurnal:jurnal.filter(j=>j.proyek===filterProyek);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Tanggal","No","Proyek","Keterangan","Kode Akun","Nama Akun","Debet","Kredit"],
    ...fj.map(j=>[j.tgl,j.no,getP(j.proyek).nama,j.ket,j.akun,j.nama,j.D,j.K])
  ]),"Jurnal");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ["Proyek","Tipe","Blok/Unit","Luas (m²)","Harga (Rp)","Status","Pembeli","Tgl Jual","Keterangan"],
    ...aset.map(a=>[getP(a.proyek).nama,a.tipe,a.blok,a.luas,a.harga,a.status,a.pembeli,a.tgl_jual,a.ket])
  ]),"Daftar Aset");
  PROYEK.forEach(pr=>{
    const rows=jurnal.filter(j=>j.proyek===pr.id);
    const p=proyekPend(pr.id),b=proyekBeban(pr.id);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
      [pr.nama],[pr.rek],[""],
      ["Tanggal","No","Keterangan","Kode","Nama Akun","Debet","Kredit"],
      ...rows.map(j=>[j.tgl,j.no,j.ket,j.akun,j.nama,j.D,j.K]),
      ["","","","","Total",rows.reduce((s,j)=>s+j.D,0),rows.reduce((s,j)=>s+j.K,0)],
      [""],["","Pendapatan","",p],["","Beban","",b],["","LABA","",p-b],
    ]),pr.id);
  });
  XLSX.writeFile(wb,`MahaKarya-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast("📊 Excel berhasil didownload!","amber");
}

        potUnit=parseFloat(v("ub-potunit"))||0,
        tgl=v("ub-tgl"),jttempo=v("ub-jttempo"),ket=v("ub-ket");
  if(!pid||!pokok||!bank) return toast("Lengkapi proyek, bank, dan pokok pinjaman!","red");
  showLoader("Menyimpan utang bank...");
  try{
    // Simpan ke tabel utang_bank
    const rows=await sbInsert("utang_bank",[{
      proyek:pid, jenis, bank, no_akad:noakad,
      pokok, potongan_per_unit:potUnit,
      tgl_akad:tgl||null, jt_tempo:jttempo||null,
      terbayar:0, ket
    }]);
    utangBank.push(...rows.map(u=>({...u,pokok:parseFloat(u.pokok)||0,potongan_per_unit:parseFloat(u.potongan_per_unit)||0,terbayar:parseFloat(u.terbayar)||0})));

    // Catat di jurnal: Debet Kas/Bank, Kredit Utang Bank
    const rekNama=COA.find(c=>c.kode===REK_COA[pid])?.nama||"Bank "+pid;
    const no="UTG-"+String(utangBank.length).padStart(3,"0");
    const ket2=`Penerimaan utang ${jenis} — ${bank}${noakad?" ("+noakad+")":""}`;
    const jRows=await sbInsert("jurnal",[
      {tgl:tgl||today(),no,ket:ket2,akun:REK_COA[pid],nama:rekNama,proyek:pid,d:pokok,k:0},
      {tgl:tgl||today(),no,ket:ket2,akun:"2-2001",nama:"KPR / Utang Jk Panjang",proyek:pid,d:0,k:pokok},
    ]);
    jRows.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));

    toast(`✅ Utang ${bank} Rp ${fmt(pokok)} berhasil dicatat!`);
    ["ub-bank","ub-noakad","ub-pokok","ub-potunit","ub-tgl","ub-jttempo","ub-ket"].forEach(id=>setV(id,""));
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

async function bayarUtang(){
  const uid=v("pay-utang-id"),tgl=v("pay-tgl"),no=v("pay-no"),
        nominal=parseFloat(v("pay-nominal"))||0,
        rek=v("pay-rek"),ket=v("pay-ket");
  if(!uid||!nominal||!tgl||!no) return toast("Lengkapi semua field pembayaran!","red");
  const ub=utangBank.find(u=>String(u.id)===String(uid));
  if(!ub) return toast("Utang tidak ditemukan","red");
  const sisa=ub.pokok-(ub.terbayar||0);
  if(nominal>sisa) return toast(`Pembayaran melebihi sisa utang Rp ${fmt(sisa)}!`,"red");

  showLoader("Menyimpan pembayaran...");
  try{
    const terbayarBaru=(ub.terbayar||0)+nominal;
    await sbUpdate("utang_bank",ub.id,{terbayar:terbayarBaru});
    const idx=utangBank.findIndex(u=>u.id===ub.id);
    if(idx>-1) utangBank[idx].terbayar=terbayarBaru;

    // Jurnal: Debet Utang Bank, Kredit Kas/Bank
    const rekNama=COA.find(c=>c.kode===rek)?.nama||rek;
    const ketJ=`Pembayaran utang ${ub.jenis} — ${ub.bank}${ket?" ("+ket+")":""}`;
    const jRows=await sbInsert("jurnal",[
      {tgl,no,ket:ketJ,akun:"2-2001",nama:"KPR / Utang Jk Panjang",proyek:ub.proyek,d:nominal,k:0},
      {tgl,no,ket:ketJ,akun:rek,nama:rekNama,proyek:ub.proyek,d:0,k:nominal},
    ]);
    jRows.forEach(r=>jurnal.push({...r,D:parseFloat(r.d)||0,K:parseFloat(r.k)||0}));

    const sisaBaru=ub.pokok-terbayarBaru;
    toast(`✅ Pembayaran Rp ${fmt(nominal)} tercatat. Sisa utang: Rp ${fmt(sisaBaru)}`);
    ["pay-nominal","pay-no","pay-ket"].forEach(id=>setV(id,""));
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

async function hapusUtang(id){
  if(!confirm("Hapus data utang ini? Jurnal terkait tidak ikut terhapus.")) return;
  showLoader("Menghapus...");
  try{
    await sbDelete("utang_bank",id);
    utangBank=utangBank.filter(u=>u.id!==id);
    toast("Data utang dihapus","amber");
  }catch(e){ toast("Gagal: "+e.message,"red"); }
  hideLoader(); renderMenu();
}

// ── INIT ─────────────────────────────────────────────────────────
renderNav();
loadAll();
</script>
