<style>
/* ── SCREEN STYLES ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Times New Roman',Times,serif;
  background:#f0f2f5;color:#111;
  font-size:11pt;line-height:1.5;
}
#app{max-width:820px;margin:0 auto;padding:20px}

/* Control bar (hidden on print) */
.controls{
  background:#1e293b;border-radius:12px;
  padding:16px 20px;margin-bottom:24px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.controls select, .controls input{
  background:#0f172a;border:1px solid #334155;
  border-radius:8px;padding:8px 12px;color:#e2e8f0;
  font-size:12px;font-family:inherit;outline:none;
}
.controls label{color:#94a3b8;font-size:11px;font-family:'DM Mono',monospace}
.btn-print{
  margin-left:auto;padding:9px 20px;border:none;border-radius:8px;
  background:#f0a500;color:#000;font-weight:700;font-size:12px;
  cursor:pointer;font-family:inherit;
}
.btn-print:hover{opacity:.85}
.status{font-size:11px;color:#64748b;font-family:monospace}

/* Loader */
#loader{
  text-align:center;padding:60px 20px;color:#64748b;
  font-family:monospace;font-size:13px;
}
.spinner{
  width:36px;height:36px;border:3px solid #e2e8f0;
  border-top-color:#f0a500;border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LAPORAN PAGES ─────────────────────────────────────────── */
.page{
  background:#fff;margin-bottom:24px;
  padding:48px 56px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  border-radius:4px;
  page-break-after:always;
}
.page:last-child{page-break-after:auto}

/* Header laporan */
.lh{text-align:center;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #111}
.lh .co{font-size:13pt;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.lh .title{font-size:12pt;font-weight:700;margin-top:4px;text-transform:uppercase}
.lh .sub{font-size:10pt;margin-top:3px;color:#333}
.lh .periode{font-size:10pt;margin-top:2px}

/* Section */
.sec-title{
  font-size:10pt;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;
  margin:16px 0 6px;padding:4px 0;
  border-bottom:1px solid #ccc;
}

/* Table laporan */
.lt{width:100%;border-collapse:collapse;margin-bottom:8px}
.lt td{padding:3px 0;font-size:10.5pt;vertical-align:top}
.lt td:last-child{text-align:right;white-space:nowrap}
.lt .indent{padding-left:20px}
.lt .indent2{padding-left:36px}
.lt .bold{font-weight:700}
.lt .total-line td{border-top:1px solid #999;padding-top:4px;font-weight:700}
.lt .double-line td{
  border-top:3px double #111;
  padding-top:5px;font-weight:700;font-size:11pt;
}
.lt .subtotal td{border-top:1px solid #ccc;padding-top:3px;font-weight:700}

/* CALK */
.calk-section{margin-bottom:20px}
.calk-title{font-weight:700;font-size:11pt;margin-bottom:6px}
.calk-body{font-size:10.5pt;line-height:1.7;text-align:justify}
.calk-body p{margin-bottom:6px}
.calk-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}
.calk-table th{
  border:1px solid #999;padding:5px 8px;
  background:#f5f5f5;font-weight:700;text-align:left;
}
.calk-table td{border:1px solid #ccc;padding:4px 8px}
.calk-table td:last-child{text-align:right}

/* Signature area */
.sig-area{
  margin-top:40px;display:flex;justify-content:space-between;
}
.sig-box{text-align:center;width:200px}
.sig-line{border-top:1px solid #333;margin-top:60px;padding-top:4px;font-size:10pt}

/* ── PRINT STYLES ──────────────────────────────────────────── */
@media print{
  body{background:#fff;font-size:10.5pt}
  #app{padding:0;max-width:100%}
  .controls{display:none!important}
  .page{
    box-shadow:none;border-radius:0;
    padding:24px 28px;margin:0;
    page-break-after:always;
  }
  .page:last-child{page-break-after:auto}
}
</style>

const fmt  = n => "Rp " + new Intl.NumberFormat("id-ID").format(Math.round(Math.abs(n)||0));
const fmtN = n => new Intl.NumberFormat("id-ID").format(Math.round(Math.abs(n)||0));

function calcSaldo(jurnal){
  const s={};
  COA.forEach(a=>{s[a.kode]={...a,D:0,K:0}});
  jurnal.forEach(j=>{
    if(!s[j.akun]) s[j.akun]={kode:j.akun,nama:j.akun,kat:"",tipe:"D",D:0,K:0};
    s[j.akun].D += parseFloat(j.d)||0;
    s[j.akun].K += parseFloat(j.k)||0;
  });
  return s;
}
function getSaldo(kode,sm){
  const a=sm[kode]; if(!a) return 0;
  return a.tipe==="D" ? a.D-a.K : a.K-a.D;
}
function sumKat(kat,sm){
  return Object.values(sm).filter(a=>a.kat===kat).reduce((s,a)=>s+getSaldo(a.kode,sm),0);
}

      fetch(`${SB_URL}/rest/v1/jurnal?select=*&order=tgl.asc`,{

      fetch(`${SB_URL}/rest/v1/aset?select=*`,{

    document.getElementById("loader").innerHTML =
      `<p style="color:#ef4444">Gagal memuat data: ${e.message}</p>`;

}

<!-- HALAMAN 5: CATATAN ATAS LAPORAN KEUANGAN (CALK)           -->

<div class="page">

  </div>

  <div class="calk-section">
    <div class="calk-title">1. UMUM</div>
    <div class="calk-body">
      <p><b>a. Pendirian Perusahaan</b><br/>
      PT. Maha Karya Haluoleo (selanjutnya disebut "Perusahaan") adalah perseroan terbatas yang bergerak di bidang properti dan kontraktor. Perusahaan berdomisili di Kendari, Sulawesi Tenggara, Indonesia.</p>
      <p><b>b. Kegiatan Usaha</b><br/>
      Kegiatan utama Perusahaan meliputi pengembangan properti (developer) dan jasa konstruksi. Proyek yang sedang berjalan meliputi: Al Fath Puuwatu, Introvert House, Loonars Living, dan Griya Cariu Indah.</p>
    </div>
  </div>

  <div class="calk-section">
    <div class="calk-title">2. IKHTISAR KEBIJAKAN AKUNTANSI SIGNIFIKAN</div>
    <div class="calk-body">
      <p><b>a. Dasar Penyusunan</b><br/>
      Laporan keuangan disusun sesuai dengan Standar Akuntansi Keuangan Entitas Mikro, Kecil, dan Menengah (SAK EMKM) yang ditetapkan oleh Ikatan Akuntan Indonesia (IAI) dan berlaku efektif 1 Januari 2018.</p>
      <p><b>b. Dasar Pengukuran</b><br/>
      Laporan keuangan disusun berdasarkan konsep biaya historis (historical cost) dan menggunakan dasar akrual (accrual basis), kecuali laporan arus kas yang menggunakan dasar kas.</p>
      <p><b>c. Kas dan Setara Kas</b><br/>
      Kas dan setara kas terdiri dari kas tunai dan simpanan di bank yang tidak dibatasi penggunaannya serta dapat segera dijadikan kas dengan risiko perubahan nilai yang tidak signifikan.</p>
      <p><b>d. Piutang Usaha</b><br/>
      Piutang usaha diakui sebesar jumlah tagihan dan dikurangi dengan estimasi kerugian penurunan nilai jika diperlukan.</p>
      <p><b>e. Aset Tetap</b><br/>
      Aset tetap diakui sebesar biaya perolehan dikurangi akumulasi penyusutan. Penyusutan dihitung menggunakan metode garis lurus (straight-line method) selama estimasi masa manfaat aset.</p>
      <p><b>f. Pengakuan Pendapatan</b><br/>
      Pendapatan dari penjualan unit properti diakui pada saat risiko dan manfaat kepemilikan telah berpindah kepada pembeli. Pendapatan jasa konstruksi diakui berdasarkan persentase penyelesaian.</p>
    </div>
  </div>

  <div class="calk-section">
    <div class="calk-title">3. KAS DAN SETARA KAS</div>
    <table class="calk-table">

}
