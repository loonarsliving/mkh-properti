<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — PT. Maha Karya Haluoleo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f18;--card:#111827;--border:#1e2d40;--accent:#f0a500;--accent2:#00b894;--text:#e2e8f0;--muted:#64748b;--danger:#ef4444;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse 60% 50% at 20% 30%, rgba(240,165,0,0.06) 0%, transparent 60%),radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0,184,148,0.05) 0%, transparent 60%);}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(30,45,64,0.2) 1px, transparent 1px),linear-gradient(90deg, rgba(30,45,64,0.2) 1px, transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.brand-icon{width:46px;height:46px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 30px rgba(240,165,0,0.25);}
.brand-text .name{font-size:14px;font-weight:700;letter-spacing:-.01em}
.brand-text .sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.card-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.card-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:24px;}
.field{margin-bottom:16px}
label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-family:'DM Mono',monospace;}
input{width:100%;background:#0d1420;border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s, box-shadow .2s;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,165,0,0.12);}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;line-height:1;transition:color .2s;}
.pw-eye:hover{color:var(--text)}
.btn-login{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#e09500);color:#000;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s, transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.btn-login:hover{opacity:.9}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.alert{border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:16px;display:none;}
.alert-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-green{background:rgba(0,184,148,.12);border:1px solid rgba(0,184,148,.3);color:#6ee7b7}
.spin{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:20px;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.footer a{color:var(--accent);text-decoration:none}
.status-bar{text-align:center;margin-bottom:20px;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.08em;}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent2);margin-right:5px;vertical-align:middle;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="wrap">
<div class="status-bar"><span class="status-dot"></span>SISTEM KEUANGAN ONLINE</div>
<div class="brand">
<div class="brand-icon">🏗</div>
<div class="brand-text">
<div class="name">PT. Maha Karya Haluoleo</div>
<div class="sub">Sistem Keuangan Properti & Kontraktor</div>
</div>
</div>
<div class="card">
<div class="card-title">Masuk ke Sistem</div>
<div class="card-sub">// akses hanya untuk pengguna terdaftar</div>
<!-- Registrasi publik DIMATIKAN: akun baru hanya dibuat Owner via menu Users.
     Ini sistem keuangan — siapa pun tidak boleh bisa daftar sendiri. -->
<div id="alert-error" class="alert alert-red"></div>
<div id="alert-success" class="alert alert-green"></div>
<div class="field">
<label>Email</label>
<input type="email" id="email" placeholder="nama@perusahaan.com" autocomplete="email"/>
</div>
<div class="field" id="field-pw">
<label>Password</label>
<div class="pw-wrap">
<input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
<button class="pw-eye" onclick="togglePw()" title="Lihat password">👁</button>
</div>
</div>
<button class="btn-login" id="btn-submit" onclick="handleLogin()">
<div class="spin" id="spinner"></div>
<span id="btn-text">Masuk →</span>
</button>
</div>
<div class="footer">
Lupa password? <a href="#" onclick="handleReset();return false;">Reset via email</a><br/><br/>
Butuh akun? Hubungi administrator.<br/>
Sistem dilindungi Supabase Auth
</div>
</div>
<script>
const SB_URL = "https://gluoioiimapyhchdasfl.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsdW9pb2lpbWFweWhjaGRhc2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDQ3MjAsImV4cCI6MjA5NTYyMDcyMH0.dHVB0jJBMjUunJKSsqbaM3MGCAq-ZRSWQEqvEyUjIyk";
function showError(msg){const el=document.getElementById("alert-error");el.textContent="⚠ "+msg;el.style.display="block";document.getElementById("alert-success").style.display="none";}
function showSuccess(msg){const el=document.getElementById("alert-success");el.textContent="✓ "+msg;el.style.display="block";document.getElementById("alert-error").style.display="none";}
function clearAlerts(){document.getElementById("alert-error").style.display="none";document.getElementById("alert-success").style.display="none";}
function setLoading(l){document.getElementById("btn-submit").disabled=l;document.getElementById("spinner").style.display=l?"block":"none";document.getElementById("btn-text").style.display=l?"none":"inline";}
function togglePw(){const inp=document.getElementById("password");inp.type=inp.type==="password"?"text":"password";}
async function handleLogin(){
clearAlerts();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;
if(!email||!password) return showError("Email dan password wajib diisi.");
if(password.length<6) return showError("Password minimal 6 karakter.");
setLoading(true);
try{
const res=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
method:"POST",
headers:{"Content-Type":"application/json","apikey":SB_KEY},
body:JSON.stringify({email,password})
});
const data=await res.json();
if(!res.ok){
const errMap={
"Invalid login credentials":"Email atau password salah.",
"Email not confirmed":"Email belum dikonfirmasi. Cek inbox Anda.",
"Password should be at least 6 characters":"Password minimal 6 karakter.",
};
const msg=data.error_description||data.msg||data.message||"Terjadi kesalahan.";
throw new Error(errMap[msg]||msg);
}
const token=data.access_token, refreshToken=data.refresh_token;
if(!token) throw new Error("Token tidak diterima dari server.");
sessionStorage.setItem("sb_access_token",token);
sessionStorage.setItem("sb_refresh_token",refreshToken);
sessionStorage.setItem("sb_user_email",data.user?.email||email);
showSuccess("Masuk berhasil! Mengalihkan...");
// Cek apakah user admin proyek (punya assignment di users_proyek)
try{
const checkRes=await fetch(`${SB_URL}/rest/v1/users_proyek?email=eq.${encodeURIComponent(email)}&select=proyek_id&limit=1`,{
headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,"Content-Type":"application/json"}
});
const checkData=await checkRes.json();
setTimeout(()=>{
if(Array.isArray(checkData)&&checkData.length>0) window.location.href="admin-proyek.html";
else window.location.href="index.html";
},600);
}catch(e){ setTimeout(()=>{window.location.href="index.html";},600); }
}catch(err){ showError(err.message); }
finally{ setLoading(false); }
}
async function handleReset(){
const email=document.getElementById("email").value.trim();
if(!email) return showError("Isi email dulu sebelum reset password.");
setLoading(true);
try{
const res=await fetch(`${SB_URL}/auth/v1/recover`,{
method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},
body:JSON.stringify({email})
});
if(!res.ok) throw new Error("Gagal mengirim email reset.");
showSuccess(`Link reset password dikirim ke ${email}. Cek inbox Anda.`);
}catch(err){ showError(err.message); }
finally{ setLoading(false); }
}
document.addEventListener("keydown",e=>{ if(e.key==="Enter") handleLogin(); });
// Cek sesi: kalau sudah login, langsung masuk
(function checkSession(){
const token=sessionStorage.getItem("sb_access_token");
if(token){
fetch(`${SB_URL}/auth/v1/user`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token}})
.then(r=>{ if(r.ok) window.location.href="index.html"; });
}
})();
</script>
</body>
</html>
