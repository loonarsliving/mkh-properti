<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Proyek — PT. Maha Karya Haluoleo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f18;--card:#111827;--border:#1e2d40;
  --accent:#f0a500;--accent2:#00b894;--text:#e2e8f0;
  --muted:#64748b;--danger:#ef4444;--purple:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;font-family:inherit;outline:none;width:100%;box-sizing:border-box;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
button{cursor:pointer;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 14px;font-size:11px;color:var(--text);border-bottom:1px solid rgba(30,45,64,.4)}
tr:hover td{background:rgba(30,45,64,.4)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-green{background:var(--accent2);color:#fff}
.btn-red{background:var(--danger);color:#fff}
.btn-amber{background:var(--accent);color:#000}
.btn-ghost{background:var(--border);color:var(--muted)}
.btn-full{width:100%;padding:12px;margin-top:4px}
.label{font-size:10px;color:var(--muted);margin-bottom:4px;display:block;letter-spacing:.03em;text-transform:uppercase}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700}
.section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#toast{position:fixed;top:20px;right:20px;z-index:9999;display:none;padding:12px 18px;border-radius:10px;font-size:12px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:320px}
#loader{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,15,24,.85);z-index:8888;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV TABS */
.nav-tab{padding:10px 14px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.04em;font-family:inherit;transition:all .2s}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Stats card */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-val{font-size:16px;font-weight:700;margin-top:4px}
</style>
</head>
<body>

<div id="toast"></div>
<div id="loader"><div class="spinner"></div><div style="font-size:12px;color:var(--muted)">Memuat...</div></div>

<!-- TOP BAR -->
<div style="background:#070b12;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px">
  <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🏗</div>
  <div style="flex:1;min-width:0">
    <div style="font-size:12px;font-weight:700">PT. Maha Karya Haluoleo</div>
    <div id="proyek-label" style="font-size:9px;color:var(--muted)">Memuat proyek...</div>
  </div>
  <div style="text-align:right">
    <div id="user-email" style="font-size:9px;color:var(--muted)"></div>
    <button class="btn btn-ghost" style="padding:5px 10px;font-size:10px;margin-top:3px" onclick="logout()">🔒 Keluar</button>
  </div>
</div>

<!-- NAV -->
<div style="background:#070b12;border-bottom:1px solid var(--border);display:flex;overflow-x:auto">
  <button class="nav-tab active" onclick="setTab('dashboard')">📊 DASHBOARD</button>
  <button class="nav-tab" onclick="setTab('kas-masuk')">💰 KAS MASUK</button>
  <button class="nav-tab" onclick="setTab('bahan')">🧱 BAHAN</button>
  <button class="nav-tab" onclick="setTab('kas-keluar')">💸 KAS KELUAR</button>
  <button class="nav-tab" onclick="setTab('tukang')">👷 TUKANG</button>
  <button class="nav-tab" onclick="setTab('laporan')">📋 LAPORAN</button>
</div>

<!-- CONTENT -->
<div id="content" style="flex:1;overflow-y:auto;padding:16px"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SB_URL = "https://gluoioiimapyhchdasfl.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsdW9pb2lpbWFweWhjaGRhc2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDQ3MjAsImV4cCI6MjA5NTYyMDcyMH0.dHVB0jJBMjUunJKSsqbaM3MGCAq-ZRSWQEqvEyUjIyk";

// ── TELEGRAM NOTIF ──────────────────────────────────────────────────────────
const TG_TOKEN="8972034832:AAGCLi9HuGbmzC9O13wH9X8YxVTPG6kMQr8"; // token lama dipakai kembali atas keputusan owner
// Chat ID per proyek - notifikasi dikirim ke grup masing-masing
const TG_CHAT_MAP={
  "AFP":"-1003825705531",  // Grup Alfath Puuwatu
  "IH": "-1004294561742",  // Grup Introvert House
  "LL": "-5180682189",     // Grup MH | Loonars Management
  "GCI":"-1003889729458",  // Grup Griya Cariu Indah
};
async function sendTG(msg){

  }catch(e){console.warn("TG:",e);}

const H = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};

const PROYEK_LIST = [
  {id:"AFP",nama:"Al Fath Puuwatu",  rek:"1901 8811 4444 1", bank:"BSI",warna:"#f0a500"},
  {id:"IH", nama:"Introvert House",  rek:"4420 1881 4099 04",bank:"BSI",warna:"#00b894"},
  {id:"LL", nama:"Loonars Living",   rek:"7801 8800 0168 1", bank:"BSI",warna:"#a78bfa"},
  {id:"GCI",nama:"Griya Cariu Indah",rek:"5018 8000 2715",   bank:"BSI",warna:"#38bdf8"},
];
const REK_COA = {AFP:"1-1002",IH:"1-1003",LL:"1-1004",GCI:"1-1005"};

// ── STATE ─────────────────────────────────────────────────────────
let USER_EMAIL = "";
let MY_PROYEK  = null; // {id, nama, warna, ...}
let jurnal      = [];
let tukang      = [];
let bayarTukangList = [];
let aset        = [];
let activeTab   = "dashboard";

// ── HELPERS ───────────────────────────────────────────────────────
const fmt   = n => new Intl.NumberFormat("id-ID").format(Math.round(Math.abs(n)||0));
const today = () => new Date().toISOString().slice(0,10);
const v     = id => document.getElementById(id)?.value||"";
const setV  = (id,val) => { const el=document.getElementById(id); if(el) el.value=val; };

function showLoader(msg="Memuat..."){
  document.getElementById("loader").style.display="flex";
  document.getElementById("loader").querySelector("div+div").textContent=msg;
}
function hideLoader(){ document.getElementById("loader").style.display="none"; }

function toast(msg, type="green"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.display="block";
  t.style.background=type==="green"?"#00b894":type==="red"?"#ef4444":"#f0a500";
  t.style.color=type==="amber"?"#000":"#fff";
  setTimeout(()=>t.style.display="none",4000);
}

function setTab(tab){
  activeTab=tab;
  document.querySelectorAll(".nav-tab").forEach(b=>{
    b.classList.toggle("active", b.getAttribute("onclick")===`setTab('${tab}')`);
  });
  render();
}

async function sbGet(table, params=""){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}&order=id.desc`,{headers:{...H,"Prefer":"return=representation"}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, rows){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(rows)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:H});
  if(!r.ok) throw new Error(await r.text());
}

// ── AUTH & SESSION ────────────────────────────────────────────────
async function init(){
  showLoader("Memeriksa sesi...");
  const token = sessionStorage.getItem("sb_access_token");
  const email = sessionStorage.getItem("sb_user_email");
  if(!token){ window.location.href="login.html"; return; }

  // Verifikasi token
  const r = await fetch(`${SB_URL}/auth/v1/user`,{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token}
  });
  if(!r.ok){ sessionStorage.clear(); window.location.href="login.html"; return; }

  USER_EMAIL = email || (await r.json()).email || "";
  document.getElementById("user-email").textContent = USER_EMAIL;

  // Ambil proyek yang di-assign ke user ini
  showLoader("Mengambil data proyek...");
  try{
    // FIX: gunakan anon key (SB_KEY) bukan user token agar RLS tidak memblokir admin baru
    const _upRes = await fetch(
      `${SB_URL}/rest/v1/users_proyek?email=eq.${encodeURIComponent(USER_EMAIL)}&select=*`,
      { headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" } }
    );
    const rows = await _upRes.json();
    if(!rows || rows.length===0){
      document.getElementById("content").innerHTML=`
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:40px;margin-bottom:16px">🚫</div>
          <div style="font-size:14px;font-weight:700;color:var(--danger)">Akses Ditolak</div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px">
            Akun <b>${USER_EMAIL}</b> belum di-assign ke proyek manapun.<br/>
            Hubungi administrator untuk mendapatkan akses.
          </div>
        </div>`;
      hideLoader(); return;
    }
    const pid = rows[0].proyek_id;
    MY_PROYEK = PROYEK_LIST.find(p=>p.id===pid);
    if(!MY_PROYEK){ toast("Proyek tidak ditemukan","red"); hideLoader(); return; }

    document.getElementById("proyek-label").textContent = `Admin — ${MY_PROYEK.nama}`;
    document.getElementById("proyek-label").style.color = MY_PROYEK.warna;

    await loadData();
  }catch(e){
    toast("Gagal: "+e.message,"red");
    hideLoader();
  }
}

async function loadData(){
  showLoader("Memuat data proyek...");
  try{
    const pid = MY_PROYEK.id;
    [jurnal, tukang, bayarTukangList, aset] = await Promise.all([
      sbGet("jurnal",`proyek=eq.${pid}&select=*`),
      sbGet("tukang_borongan",`proyek=eq.${pid}&select=*`).catch(()=>[]),
      sbGet("bayar_tukang",`proyek=eq.${pid}&select=*`).catch(()=>[]),
      sbGet("aset",`proyek=eq.${pid}&select=*`).catch(()=>[]),
    ]);
    jurnal = jurnal.map(j=>({...j,D:parseFloat(j.d)||0,K:parseFloat(j.k)||0}));
    tukang = tukang.map(t=>({...t,
      nilai_kontrak:parseFloat(t.nilai_kontrak)||0,
      harga_per_unit:parseFloat(t.harga_per_unit)||0,
      total_unit:parseFloat(t.total_unit)||0,
      terbayar:parseFloat(t.terbayar)||0,
      unit_selesai:parseFloat(t.unit_selesai)||0,
    }));
    bayarTukangList = bayarTukangList.map(b=>({...b,
      nominal:parseFloat(b.nominal)||0,
      unit_minggu:parseFloat(b.unit_minggu)||0,
    }));
  }catch(e){ toast("Gagal memuat: "+e.message,"red"); }
  hideLoader();
  render();
}

function logout(){ sessionStorage.clear(); window.location.href="login.html"; }

// ── KALKULASI ─────────────────────────────────────────────────────
function totalKeluar(kat){
  return jurnal.filter(j=>{
    if(kat==="bahan") return ["5-1001","5-1002"].includes(j.akun);
    if(kat==="tukang") return ["5-1003","5-1004"].includes(j.akun);
    return false;
  }).reduce((s,j)=>s+j.D,0);
}
function totalMasuk(){
  return jurnal.filter(j=>["4-1001","4-1002","4-1003"].includes(j.akun)).reduce((s,j)=>s+j.K,0);
}
function saldoKas(){
  const rekKode = REK_COA[MY_PROYEK.id];
  const masuk = jurnal.filter(j=>j.akun===rekKode).reduce((s,j)=>s+j.D,0);
  const keluar= jurnal.filter(j=>j.akun===rekKode).reduce((s,j)=>s+j.K,0);
  return masuk-keluar;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  const C = document.getElementById("content");
  const p = MY_PROYEK;
  if(!p) return;

  // ── DASHBOARD ──
  if(activeTab==="dashboard"){
    const totMasuk   = totalMasuk();
    const totBahan   = totalKeluar("bahan");
    const totTukang  = totalKeluar("tukang");
    const totKeluar  = totBahan+totTukang;
    const kas        = saldoKas();
    const tkAktif    = tukang.filter(t=>t.terbayar<t.nilai_kontrak);
    const tkSisaBayar= tukang.reduce((s,t)=>s+Math.max(0,t.nilai_kontrak-t.terbayar),0);

    C.innerHTML=`
    <div style="border-left:3px solid ${p.warna};padding-left:12px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:${p.warna}">${p.id} — ${p.nama}</div>
      <div style="font-size:9px;color:var(--muted)">${p.bank} · ${p.rek}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="stat-card" style="border-left:3px solid var(--accent2)">
        <div class="label">Saldo Kas Proyek</div>
        <div class="stat-val" style="color:var(--accent2)">Rp ${fmt(kas)}</div>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--accent)">
        <div class="label">Total Pendapatan</div>
        <div class="stat-val" style="color:var(--accent)">Rp ${fmt(totMasuk)}</div>
      </div>
      <div class="stat-card" style="border-left:3px solid #38bdf8">
        <div class="label">Pengeluaran Bahan</div>
        <div class="stat-val" style="color:#38bdf8">Rp ${fmt(totBahan)}</div>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--purple)">
        <div class="label">Bayar Tukang/Kontraktor</div>
        <div class="stat-val" style="color:var(--purple)">Rp ${fmt(totTukang)}</div>
      </div>
    </div>

    <!-- Ringkasan Tukang Aktif -->
    <div class="card">
      <div class="section-title">Tukang / Kontraktor Aktif</div>
      ${tkAktif.length===0
        ? `<div style="color:var(--muted);font-size:11px;text-align:center;padding:16px">Tidak ada kontrak aktif</div>`
        : tkAktif.map(t=>{
            const sisa=t.nilai_kontrak-t.terbayar;
            const pct=Math.min(100,(t.terbayar/t.nilai_kontrak)*100);
            return `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <div style="font-size:12px;font-weight:700">${t.nama}</div>
                <div style="font-size:10px;color:var(--muted)">${t.item||"-"}</div>
              </div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                <span style="font-size:10px;color:var(--muted)">Kontrak: <b style="color:var(--text)">Rp ${fmt(t.nilai_kontrak)}</b></span>
                <span style="font-size:10px;color:var(--danger)">Sisa: <b>Rp ${fmt(sisa)}</b></span>
              </div>
              <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:var(--accent2)"></div>
              </div>
              <div style="font-size:9px;color:var(--muted);margin-top:2px">${pct.toFixed(1)}% terbayar</div>
            </div>`;
          }).join("")
      }
      ${tkAktif.length>0?`
      <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border)">
        <span style="font-size:11px;color:var(--muted)">Total Sisa Bayar Tukang</span>
        <span style="font-size:12px;font-weight:700;color:var(--danger)">Rp ${fmt(tkSisaBayar)}</span>
      </div>`:""}
    </div>

    <!-- Transaksi Terakhir -->
    <div class="card">
      <div class="section-title">Transaksi Terakhir (10)</div>
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Tgl</th><th>Keterangan</th><th>Debet</th><th>Kredit</th></tr></thead>
        <tbody>
          ${jurnal.slice(0,10).map(j=>`<tr>
            <td style="white-space:nowrap">${j.tgl||"-"}</td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${j.ket||"-"}</td>
            <td style="color:var(--danger)">${j.D>0?"Rp "+fmt(j.D):"-"}</td>
            <td style="color:var(--accent2)">${j.K>0?"Rp "+fmt(j.K):"-"}</td>
          </tr>`).join("")}
        </tbody>
      </table>
      </div>
    </div>`;
  }

  // ── KAS MASUK ──
  else if(activeTab==="kas-masuk"){
    const noKM = "KM-"+String(jurnal.filter(j=>j.no?.startsWith("KM")).length+1).padStart(3,"0");
    const rekKode = REK_COA[p.id];
    const blokOptions = aset.length>0
      ? aset.map(a=>"<option value='"+a.blok+"'>"+a.blok+(a.pembeli?" — "+a.pembeli:"")+"</option>").join("")
      : "<option value=''>-- Belum ada unit --</option>";
    const kmList = jurnal.filter(j=>["4-1001","4-1002","4-1003"].includes(j.akun));

    C.innerHTML="<div class='card'>"
      +"<div class='section-title'>Input Kas Masuk — "+p.nama+"</div>"
      +"<div class='grid2' style='margin-bottom:10px'>"
      +"<div><span class='label'>Tanggal</span><input type='date' id='km-tgl' value='"+today()+"'/></div>"
      +"<div><span class='label'>No Transaksi</span><input type='text' id='km-no' value='"+noKM+"'/></div>"
      +"</div>"
      +"<div style='margin-bottom:10px'><span class='label'>Pilih Blok / Unit</span>"
      +"<select id='km-blok'>"+blokOptions+"</select></div>"
      +"<div style='margin-bottom:10px'><span class='label'>Jenis Penerimaan</span>"
      +"<select id='km-jenis'>"
      +"<option>Uang Muka / DP</option>"
      +"<option>Cicilan Pembeli</option>"
      +"<option>Pelunasan</option>"
      +"<option>Pendapatan Lain</option>"
      +"</select></div>"
      +"<div style='margin-bottom:10px'><span class='label'>Nama Pembeli</span>"
      +"<input type='text' id='km-pembeli' placeholder='Nama pembeli atau sumber dana'/></div>"
      +"<div class='grid2' style='margin-bottom:10px'>"
      +"<div><span class='label'>Nominal (Rp)</span><input type='number' id='km-nominal' placeholder='0'/></div>"
      +"<div><span class='label'>Via</span><select id='km-via'>"
      +"<option value='"+rekKode+"'>Transfer Bank "+p.bank+"</option>"
      +"<option value='1-1001'>Tunai</option>"
      +"</select></div></div>"
      +"<div style='margin-bottom:14px'><span class='label'>Keterangan</span>"
      +"<input type='text' id='km-ket' placeholder='Keterangan tambahan'/></div>"
      +"<div style='display:flex;gap:10px'>"
      +"<button class='btn btn-green' style='flex:1' onclick='simpanKasMasuk()'>+ Simpan</button>"
      +"<button class='btn btn-amber' style='flex:1' onclick='simpanDanCetakKwitansi()'>🖨 Simpan & Cetak Kwitansi</button>"
      +"</div></div>"

      +"<div class='card'>"
      +"<div class='section-title'>Riwayat Kas Masuk ("+kmList.length+")</div>"
      +"<div style='overflow-x:auto'><table>"
      +"<thead><tr><th>Tgl</th><th>No</th><th>Keterangan</th><th>Nominal</th><th></th></tr></thead>"
      +"<tbody>"
      +(kmList.map(j=>
        "<tr>"
        +"<td>"+j.tgl+"</td>"
        +"<td style='color:var(--accent)'>"+j.no+"</td>"
        +"<td style='max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'>"+j.ket+"</td>"
        +"<td style='color:var(--accent2)'>Rp "+fmt(j.K)+"</td>"
        +"<td><button class='btn btn-ghost' style='padding:3px 8px;font-size:10px' onclick='cetakKwitansiDariJurnal("+j.id+")'>🖨</button></td>"
        +"</tr>"
      ).join("") || "<tr><td colspan='5' style='text-align:center;color:var(--muted)'>Belum ada data</td></tr>")

// ── SIMPAN KAS MASUK ──────────────────────────────────────────────
function getKMData(){
  return {
    tgl:v("km-tgl"), no:v("km-no"), jenis:v("km-jenis"),
    blok:v("km-blok"), pembeli:v("km-pembeli"),
    nominal:parseFloat(v("km-nominal"))||0,
    via:v("km-via"), ket:v("km-ket")
  };
}

async function simpanKasMasuk(){

function bukaCetakKwitansi(data){
  const tglFmt = new Date(data.tgl).toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  const fmtRp = n=>"Rp "+new Intl.NumberFormat("id-ID").format(Math.round(n));
  
  // Terbilang sederhana
  function terbilang(n){
    const sat=["","satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan",
               "sepuluh","sebelas","dua belas","tiga belas","empat belas","lima belas",
               "enam belas","tujuh belas","delapan belas","sembilan belas"];
    const pul=["","","dua puluh","tiga puluh","empat puluh","lima puluh",
               "enam puluh","tujuh puluh","delapan puluh","sembilan puluh"];
    if(n<20) return sat[n];
    if(n<100) return pul[Math.floor(n/10)]+(n%10?" "+sat[n%10]:"");
    if(n<1000) return (n===100?"seratus":sat[Math.floor(n/100)]+" ratus")+(n%100?" "+terbilang(n%100):"");
    if(n<1000000) return terbilang(Math.floor(n/1000))+" ribu"+(n%1000?" "+terbilang(n%1000):"");
    if(n<1000000000) return terbilang(Math.floor(n/1000000))+" juta"+(n%1000000?" "+terbilang(n%1000000):"");
    return terbilang(Math.floor(n/1000000000))+" miliar"+(n%1000000000?" "+terbilang(n%1000000000):"");
  }

  const w = window.open("","_blank","width=800,height=600");
  w.document.write(`<!DOCTYPE html><html><head>
  <meta charset="UTF-8"/>
  <title>Kwitansi ${data.no}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Times New Roman',serif;background:#fff;color:#111;padding:32px;max-width:720px;margin:0 auto}
    .logo-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:3px solid #111}
    .logo-bar img{height:56px;object-fit:contain}
    .title{text-align:center;margin-bottom:20px}
    .title h1{font-size:22pt;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
    .title .no{font-size:11pt;color:#555;margin-top:4px}
    .box{border:2px solid #111;border-radius:4px;padding:16px 20px;margin-bottom:16px}
    .row{display:flex;margin-bottom:8px;font-size:11pt}
    .row .lbl{width:180px;color:#555;flex-shrink:0}
    .row .val{flex:1;font-weight:700;border-bottom:1px solid #ccc;padding-bottom:2px}
    .nominal-box{background:#f8f8f8;border:2px solid #111;border-radius:4px;padding:14px 20px;text-align:center;margin-bottom:16px}
    .nominal-box .rp{font-size:20pt;font-weight:700}
    .nominal-box .terbilang{font-size:10pt;color:#555;font-style:italic;margin-top:4px;text-transform:capitalize}
    .footer{display:flex;justify-content:space-between;margin-top:32px}
    .sig{text-align:center;width:200px}
    .sig-line{border-top:1px solid #111;margin-top:70px;padding-top:6px;font-size:10pt}
    .watermark{text-align:center;margin-top:24px;font-size:9pt;color:#aaa;border-top:1px solid #eee;padding-top:12px}
    @media print{
      body{padding:16px}
      .no-print{display:none}
    }
  </style>
  </head><body>

  <!-- LOGO BAR -->
  <div class="logo-bar">
    <img src="https://raw.githubusercontent.com/loonarsliving/mkh-properti/refs/heads/main/IMG_0966.png" alt="MKH"/>
    <img src="https://raw.githubusercontent.com/loonarsliving/mkh-properti/refs/heads/main/IMG_1739.png" alt="Loonars"/>
  </div>

  <!-- JUDUL -->
  <div class="title">

  </div>

  <!-- NOMINAL -->
  <div class="nominal-box">
    <div class="rp">${fmtRp(data.nominal)}</div>

        +"<td style='text-align:center'>"+(i+1)+"</td>"
        +"<td style='font-weight:700'>"+b.tukang_nama+"</td>"
        +"<td style='text-align:center'>"+b.blok_selesai+"</td>"
        +"<td style='text-align:center'>"+b.unit_minggu+" unit</td>"
        +"<td style='text-align:right;font-weight:700;color:#2d6a4f'>"+fmtRp(b.nominal)+"</td>"
        +"</tr>"
      ).join("")
    : "<tr><td colspan='5' style='text-align:center;color:#999'>Belum ada pembayaran minggu ini</td></tr>";

  const totalMingguIni = bayarMingguIni.reduce((s,b)=>s+b.nominal,0);

  // Build tabel rekap sisa kontrak
  const barisSisa = tukang.map((t,i)=>{
    const sisa=t.nilai_kontrak-t.terbayar;
    const sisaUnit=(t.total_unit||0)-(t.unit_selesai||0);
    const pct=t.nilai_kontrak>0?Math.min(100,(t.terbayar/t.nilai_kontrak)*100):0;
    const lunas=sisa<=0;
    return "<tr>"
      +"<td style='text-align:center'>"+(i+1)+"</td>"
      +"<td style='font-weight:700'>"+t.nama+"</td>"
      +"<td>"+( t.item||"-")+"</td>"
      +"<td style='text-align:right'>"+fmtRp(t.nilai_kontrak)+"</td>"
      +"<td style='text-align:right;color:#2d6a4f'>"+fmtRp(t.terbayar)+"</td>"
      +"<td style='text-align:right;color:"+(lunas?"#2d6a4f":"#c0392b")+"'>"+( lunas?"✓ LUNAS":fmtRp(sisa))+"</td>"
      +"<td style='text-align:center'>"+(lunas?"✓":sisaUnit+" unit")+"</td>"
      +"<td style='text-align:center'>"
      +"<div style='background:#eee;border-radius:4px;height:8px;width:80px;display:inline-block;vertical-align:middle'>"
      +"<div style='width:"+pct.toFixed(0)+"%;height:100%;background:"+(lunas?"#2d6a4f":"#f0a500")+";border-radius:4px'></div>"
      +"</div> "+pct.toFixed(0)+"%"
      +"</td>"
      +"</tr>";
  }).join("");

  const totalKontrak = tukang.reduce((s,t)=>s+t.nilai_kontrak,0);
  const totalTerbayar = tukang.reduce((s,t)=>s+t.terbayar,0);
  const totalSisa = tukang.reduce((s,t)=>s+Math.max(0,t.nilai_kontrak-t.terbayar),0);

  w.document.write(`<!DOCTYPE html><html><head>
  <meta charset="UTF-8"/>
  <title>Laporan Gaji Tukang — ${p.nama}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Times New Roman',serif;background:#fff;color:#111;padding:28px;max-width:900px;margin:0 auto;font-size:10.5pt}
    .logo-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:3px solid #111}
    .logo-bar img{height:48px;object-fit:contain}
    .header{text-align:center;margin-bottom:20px}
    .header h1{font-size:16pt;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .header .sub{font-size:10pt;color:#555;margin-top:4px}
    .info-bar{display:flex;gap:24px;background:#f8f8f8;border:1px solid #ddd;border-radius:4px;padding:10px 16px;margin-bottom:18px;flex-wrap:wrap}
    .info-bar div{font-size:10pt}
    .info-bar span{color:#555;font-size:9pt;display:block}
    .sec{font-size:11pt;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px;padding-bottom:4px;border-bottom:2px solid #111}
    table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:10pt}
    th{background:#111;color:#fff;padding:7px 10px;text-align:left;font-size:9pt;font-weight:700}
    td{padding:6px 10px;border-bottom:1px solid #e0e0e0;vertical-align:middle}
    tr:nth-child(even) td{background:#f9f9f9}
    .total-row td{font-weight:700;border-top:2px solid #111;background:#f0f0f0}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
    .sum-box{border:2px solid #111;border-radius:4px;padding:12px;text-align:center}
    .sum-box .val{font-size:14pt;font-weight:700;margin-top:4px}
    .sum-box .lbl{font-size:9pt;color:#555;text-transform:uppercase;letter-spacing:.04em}
    .footer{display:flex;justify-content:space-between;margin-top:32px;padding-top:16px;border-top:1px solid #ccc}
    .sig{text-align:center;width:180px}
    .sig-line{border-top:1px solid #111;margin-top:60px;padding-top:4px;font-size:9.5pt}
    .watermark{text-align:center;margin-top:20px;font-size:8.5pt;color:#aaa}
    @media print{body{padding:12px}.no-print{display:none}}
  </style>
  </head><body>

  <div class="logo-bar">
    <img src="https://raw.githubusercontent.com/loonarsliving/mkh-properti/refs/heads/main/IMG_0966.png" alt="MKH"/>
    <img src="https://raw.githubusercontent.com/loonarsliving/mkh-properti/refs/heads/main/IMG_1739.png" alt="Loonars"/>
  </div>

  <div class="header">
    <h1>Laporan Gaji Tukang / Kontraktor</h1>
    <div class="sub">${p.nama} &bull; Dicetak: ${tglCetak}</div>
  </div>

  <div class="info-bar">
    <div><span>Proyek</span>${p.nama}</div>
    <div><span>Periode Minggu Ini</span>${mingguTerakhir}</div>
    <div><span>Total Tukang</span>${tukang.length} orang</div>
    <div><span>Dibuat oleh</span>${USER_EMAIL}</div>
  </div>

  <!-- RINGKASAN -->
  <div class="summary">
    <div class="sum-box">
      <div class="lbl">Gaji Minggu Ini</div>
      <div class="val" style="color:#2d6a4f">${fmtRp(totalMingguIni)}</div>
    </div>
    <div class="sum-box">
      <div class="lbl">Total Terbayar s/d Ini</div>
      <div class="val" style="color:#f0a500">${fmtRp(totalTerbayar)}</div>
    </div>
    <div class="sum-box">
      <div class="lbl">Sisa Kontrak Semua Tukang</div>
      <div class="val" style="color:#c0392b">${fmtRp(totalSisa)}</div>
    </div>
  </div>

  <!-- GAJI MINGGU INI -->
  <div class="sec">Pembayaran Minggu Ini — ${mingguTerakhir}</div>
  <table>
    <thead><tr><th>#</th><th>Nama Tukang</th><th>Blok Selesai</th><th>Unit</th><th style="text-align:right">Gaji Dibayar</th></tr></thead>
    <tbody>${barisGajiMingguIni}</tbody>
    <tr class="total-row">
      <td colspan="4">TOTAL DIBAYAR MINGGU INI</td>
      <td style="text-align:right">${fmtRp(totalMingguIni)}</td>
    </tr>
  </table>

  <!-- REKAP SISA KONTRAK -->
  <div class="sec">Rekap Status Kontrak & Sisa Gaji</div>
  <table>
    <thead><tr><th>#</th><th>Nama</th><th>Pekerjaan</th><th style="text-align:right">Kontrak</th><th style="text-align:right">Terbayar</th><th style="text-align:right">Sisa</th><th style="text-align:center">Sisa Unit</th><th style="text-align:center">Progress</th></tr></thead>
    <tbody>${barisSisa}</tbody>
    <tr class="total-row">
      <td colspan="3">TOTAL</td>
      <td style="text-align:right">${fmtRp(totalKontrak)}</td>
      <td style="text-align:right">${fmtRp(totalTerbayar)}</td>
      <td style="text-align:right;color:#c0392b">${fmtRp(totalSisa)}</td>
      <td colspan="2"></td>
    </tr>
  </table>

  <!-- TANDA TANGAN -->
  <div class="footer">
    <div class="sig">
      <div style="font-size:9.5pt">Mengetahui,</div>
      <div class="sig-line">( _____________________ )<br/>Admin Proyek</div>
    </div>
    <div class="sig">
      <div style="font-size:9.5pt">Menyetujui,</div>
      <div class="sig-line">( _____________________ )<br/>Direktur</div>
    </div>
  </div>

  <div class="watermark">PT. Maha Karya Haluoleo &bull; Laporan dibuat otomatis oleh Sistem Keuangan Digital</div>

  <div class="no-print" style="text-align:center;margin-top:20px">
    <button onclick="window.print()" style="padding:12px 32px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">🖨 Cetak / Simpan PDF</button>
  </div>
  <script>setTimeout(()=>window.print(),800);<\/script>
  </body></html>`);
  w.document.close();
}

// ── INIT ──────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
